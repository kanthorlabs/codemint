# Required metadata
name: brainstorming
version: "1.0"
description: |
  Coding Workflow: Project Overview → Goal → Reality → Options → Plan → Verify → Confirm.

# Workflow-level settings
settings:
  default_timeout: 3600000  # 1 hour per task (ms)
  guardrails:
    verification: true      # Auto-inject verification after coding stories
    confirmation: true      # Auto-inject confirmation after stories
    retrospective: true     # Auto-inject retrospective at end of epic

# Epic → Story hierarchy
epics:
  - id: planning
    name: "Coding Workflow"
    description: "Goal-driven coding workflow with verification and confirmation"

    stories:
      - id: gather
        name: "Project Overview"
        skill: "@codemint/gatherer"
        type: coding

      - id: capture_goal
        name: "Goal Capture"
        skill: "@codemint/goal-capture"
        type: coding
        depends_on: gather
        exit_on:
          command: "/lock-goal"
        output:
          handler: "lock_workflow_goal"

      - id: gather_targeted
        name: "Goal-scoped Reality"
        skill: "@codemint/targeted-gatherer"
        type: coding
        depends_on: capture_goal
        output:
          handler: "append_targeted_context"

      - id: propose_options
        name: "Options Proposal"
        skill: "@codemint/options-proposer"
        type: coding
        depends_on: gather_targeted
        exit_on:
          commands:
            - "/pick-option"
            - "/modify"
        output:
          handler: "lock_chosen_option"
